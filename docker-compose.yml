version: '3.8'

services:
  # Database
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sua_senha_forte_aqui}
      POSTGRES_DB: ${DB_NAME:-auto_teste}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-auto_teste}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-sua_senha_forte_aqui}@db:5432/${DB_NAME:-auto_teste}
      SECRET_KEY: ${SECRET_KEY:-sua_senha_forte_aqui}
      DEBUG: "false"
      KEYCLOAK_BASE_URL: ${KEYCLOAK_BASE_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-logtudo}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-hub-automacao}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-}
      KEYCLOAK_REDIRECT_URI: ${KEYCLOAK_REDIRECT_URI:-http://localhost:8000/api/v1/auth/callback}
      KEYCLOAK_SCOPE: ${KEYCLOAK_SCOPE:-openid profile email}
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE:-}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    labels:
      - traefik.enable=true
      - traefik.http.routers.automation-hub.rule=Host(`auto.logtudo.com.br`)
      - traefik.http.routers.automation-hub.entrypoints=http,https
      - traefik.http.services.automation-hub.loadbalancer.server.port=8000
      - coolify.managed=true
      - coolify.proxy=true
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
