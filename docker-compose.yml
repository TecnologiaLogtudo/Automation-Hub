version: '3.8'

services:
  # Database (dev)
  db:
    image: postgres:16-alpine
    container_name: automation-hub-db-dev
    environment:
      POSTGRES_USER: ${DB_DEV_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_DEV_PASSWORD:-dev_password_segura}
      POSTGRES_DB: ${DB_DEV_NAME:-automacao_db_dev}
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    # Opcional: expor porta para você conectar do seu PC
    ports:
      - "5433:5432"   # host:container (mude se já usar 5433 no VPS)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_DEV_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend API (dev)
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: automation-hub-dev
    environment:
      DATABASE_URL: postgresql://${DB_DEV_USER:-postgres}:${DB_DEV_PASSWORD:-dev_password_segura}@db:5432/${DB_DEV_NAME:-automacao_db_dev}
      SECRET_KEY: ${DEV_SECRET_KEY:-uma_secret_key_dev_bem_grande}
      DEBUG: "true"          # Em dev, ligamos DEBUG
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    labels:
      - traefik.enable=true
      # Use um host diferente para não bater com produção
      - traefik.http.routers.automation-hub-dev.rule=Host(`b8o0wkc0c0kgw8g0wgwsww0s.72.61.25.133.sslip.io`)
      - traefik.http.routers.automation-hub-dev.entrypoints=http,https
      - traefik.http.services.automation-hub-dev.loadbalancer.server.port=8000
      - coolify.managed=true
      - coolify.proxy=true
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data_dev: